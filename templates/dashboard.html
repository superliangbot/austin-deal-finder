<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austin Deal Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 24px 32px;
            border-bottom: 2px solid #e94560;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: #e94560;
        }

        .header-subtitle {
            font-size: 14px;
            color: #8892b0;
            margin-top: 2px;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: #8892b0;
        }

        .refresh-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #44bb44;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Stats Bar */
        .stats-bar {
            max-width: 1400px;
            margin: 24px auto;
            padding: 0 32px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 20px 24px;
            text-align: center;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #e94560;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        .stat-value.highlight {
            color: #e94560;
        }

        .stat-label {
            font-size: 13px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Controls Section */
        .controls {
            max-width: 1400px;
            margin: 0 auto 24px;
            padding: 0 32px;
        }

        .controls-bar {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 20px 24px;
            display: flex;
            align-items: flex-end;
            gap: 16px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 140px;
        }

        .control-group label {
            font-size: 12px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .control-group input,
        .control-group select {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            padding: 10px 14px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .control-group input:focus,
        .control-group select:focus {
            border-color: #e94560;
        }

        .control-group input::placeholder {
            color: #4a5568;
        }

        .control-group select option {
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: #e94560;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #d63851;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #0f3460;
            color: #8892b0;
        }

        .btn-secondary:hover {
            background: #163a6a;
            color: #e0e0e0;
        }

        /* Listings Container */
        .listings-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px 48px;
        }

        .listings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .listings-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .listings-count {
            font-size: 13px;
            color: #8892b0;
        }

        /* Loading & Empty States */
        .loading-state,
        .empty-state,
        .error-state {
            text-align: center;
            padding: 64px 24px;
            color: #8892b0;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            color: #e94560;
        }

        /* Listing Cards */
        .listings-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .listing-card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 20px 24px;
            display: grid;
            grid-template-columns: 72px 1fr auto;
            gap: 20px;
            align-items: center;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .listing-card:hover {
            transform: translateY(-1px);
            border-color: #e9456040;
        }

        /* Score Badge */
        .score-badge {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .score-badge .score-number {
            font-size: 24px;
            line-height: 1;
        }

        .score-badge .score-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
            margin-top: 2px;
        }

        .score-hot {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #ffffff;
        }

        .score-good {
            background: linear-gradient(135deg, #2d9644, #44bb44);
            color: #ffffff;
        }

        .score-average {
            background: linear-gradient(135deg, #b8a820, #cccc44);
            color: #1a1a2e;
        }

        .score-low {
            background: linear-gradient(135deg, #555555, #888888);
            color: #e0e0e0;
        }

        /* Listing Details */
        .listing-details {
            min-width: 0;
        }

        .listing-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }

        .listing-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            transition: color 0.2s ease;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .listing-title:hover {
            color: #e94560;
        }

        .classification-badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge-steal {
            background: #e9456030;
            color: #ff4444;
            border: 1px solid #ff444460;
        }

        .badge-good-deal {
            background: #44bb4430;
            color: #44bb44;
            border: 1px solid #44bb4460;
        }

        .badge-average {
            background: #cccc4430;
            color: #cccc44;
            border: 1px solid #cccc4460;
        }

        .badge-overpriced {
            background: #88888830;
            color: #888888;
            border: 1px solid #88888860;
        }

        .listing-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #8892b0;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .meta-icon {
            font-size: 14px;
            opacity: 0.7;
        }

        .source-tag {
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            background: #0f3460;
            color: #8892b0;
        }

        /* Listing Price Column */
        .listing-price-col {
            text-align: right;
            flex-shrink: 0;
        }

        .listing-price {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
        }

        .listing-estimated {
            font-size: 12px;
            color: #8892b0;
            margin-top: 2px;
        }

        .listing-date {
            font-size: 11px;
            color: #4a5568;
            margin-top: 6px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 16px 16px;
            }

            .header h1 {
                font-size: 22px;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
                padding: 0 16px;
                gap: 10px;
                margin: 16px auto;
            }

            .stat-card {
                padding: 14px 16px;
            }

            .stat-value {
                font-size: 24px;
            }

            .controls {
                padding: 0 16px;
            }

            .controls-bar {
                padding: 16px;
                gap: 12px;
            }

            .control-group {
                min-width: 100%;
            }

            .listings-container {
                padding: 0 16px 32px;
            }

            .listing-card {
                grid-template-columns: 56px 1fr;
                gap: 14px;
                padding: 16px;
            }

            .listing-price-col {
                grid-column: 1 / -1;
                text-align: left;
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .listing-title {
                white-space: normal;
                font-size: 15px;
            }

            .score-badge {
                width: 52px;
                height: 52px;
            }

            .score-badge .score-number {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .stats-bar {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .stat-value {
                font-size: 20px;
            }

            .stat-label {
                font-size: 11px;
            }

            .header-meta {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div>
                <h1>Austin <span>Deal Finder</span></h1>
                <div class="header-subtitle">Downtown Austin Housing Deals</div>
            </div>
            <div class="header-meta">
                <div class="refresh-indicator">
                    <div class="refresh-dot"></div>
                    <span id="refresh-status">Live - updates every 60s</span>
                </div>
                <span id="last-updated"></span>
            </div>
        </div>
    </header>

    <!-- Stats Bar -->
    <section class="stats-bar">
        <div class="stat-card">
            <div class="stat-value" id="stat-total">{{ stats.total_active }}</div>
            <div class="stat-label">Total Listings</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-avg-price">${{ stats.avg_price }}</div>
            <div class="stat-label">Avg Price</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-avg-score">{{ stats.avg_score }}</div>
            <div class="stat-label">Avg Score</div>
        </div>
        <div class="stat-card">
            <div class="stat-value highlight" id="stat-steals">{{ stats.steals_count }}</div>
            <div class="stat-label">Steals Found</div>
        </div>
    </section>

    <!-- Filter Controls -->
    <section class="controls">
        <div class="controls-bar">
            <div class="control-group">
                <label for="filter-min-price">Min Price</label>
                <input type="number" id="filter-min-price" placeholder="0" min="0" step="50">
            </div>
            <div class="control-group">
                <label for="filter-max-price">Max Price</label>
                <input type="number" id="filter-max-price" placeholder="2000" min="0" step="50">
            </div>
            <div class="control-group">
                <label for="filter-source">Source</label>
                <select id="filter-source">
                    <option value="all">All Sources</option>
                    <option value="reddit">Reddit</option>
                    <option value="craigslist">Craigslist</option>
                    <option value="apartments_com">Apartments.com</option>
                    <option value="zillow">Zillow</option>
                    <option value="hotpads">HotPads</option>
                    <option value="manual">Manual</option>
                </select>
            </div>
            <div class="control-group">
                <label for="filter-min-score">Min Score</label>
                <input type="number" id="filter-min-score" placeholder="0" min="0" max="100" step="5">
            </div>
            <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
            <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
        </div>
    </section>

    <!-- Listings -->
    <section class="listings-container">
        <div class="listings-header">
            <h2>Listings</h2>
            <span class="listings-count" id="listings-count"></span>
        </div>
        <div id="listings-area">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <div>Loading listings...</div>
            </div>
        </div>
    </section>

    <script>
        // State
        let allListings = [];
        let refreshTimer = null;

        // Helpers
        function formatPrice(price) {
            if (price == null) return 'N/A';
            return '$' + Number(price).toLocaleString('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            const now = new Date();
            const diffMs = now - d;
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

            if (diffHours < 1) return 'Just now';
            if (diffHours < 24) return diffHours + 'h ago';
            if (diffDays < 7) return diffDays + 'd ago';
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function getScoreClass(score) {
            if (score >= 80) return 'score-hot';
            if (score >= 65) return 'score-good';
            if (score >= 40) return 'score-average';
            return 'score-low';
        }

        function getScoreLabel(score) {
            if (score >= 80) return 'HOT';
            if (score >= 65) return 'GOOD';
            if (score >= 40) return 'AVG';
            return 'LOW';
        }

        function getClassificationBadge(classification) {
            const map = {
                'STEAL':      { class: 'badge-steal',     label: 'Steal' },
                'GOOD_DEAL':  { class: 'badge-good-deal', label: 'Good Deal' },
                'AVERAGE':    { class: 'badge-average',    label: 'Average' },
                'OVERPRICED': { class: 'badge-overpriced', label: 'Overpriced' }
            };
            const info = map[classification] || { class: 'badge-average', label: classification || 'Unscored' };
            return '<span class="classification-badge ' + info.class + '">' + info.label + '</span>';
        }

        function formatSourceName(source) {
            const map = {
                'reddit': 'Reddit',
                'craigslist': 'Craigslist',
                'apartments_com': 'Apartments.com',
                'zillow': 'Zillow',
                'hotpads': 'HotPads',
                'manual': 'Manual'
            };
            return map[source] || source;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Render a single listing card
        function renderListing(listing) {
            const score = listing.deal_score != null ? listing.deal_score : 0;
            const scoreClass = getScoreClass(score);
            const scoreLabel = getScoreLabel(score);
            const classificationBadge = getClassificationBadge(listing.deal_classification);

            const title = escapeHtml(listing.title || 'Untitled Listing');
            const sourceUrl = listing.source_url ? escapeHtml(listing.source_url) : '#';
            const price = formatPrice(listing.price);
            const estimatedTotal = listing.estimated_total ? formatPrice(listing.estimated_total) : null;
            const distance = listing.distance_miles != null
                ? listing.distance_miles.toFixed(1) + ' mi'
                : 'N/A';
            const listingType = listing.listing_type
                ? escapeHtml(listing.listing_type.replace(/_/g, ' '))
                : '';
            const source = formatSourceName(listing.source);
            const firstSeen = formatDate(listing.first_seen_at);

            return '<div class="listing-card">' +
                '<div class="score-badge ' + scoreClass + '">' +
                    '<span class="score-number">' + score + '</span>' +
                    '<span class="score-label">' + scoreLabel + '</span>' +
                '</div>' +
                '<div class="listing-details">' +
                    '<div class="listing-title-row">' +
                        '<a href="' + sourceUrl + '" target="_blank" rel="noopener noreferrer" class="listing-title">' + title + '</a>' +
                        classificationBadge +
                    '</div>' +
                    '<div class="listing-meta">' +
                        '<span class="meta-item">' +
                            '<span class="meta-icon">&#128205;</span> ' + distance +
                        '</span>' +
                        (listingType ?
                            '<span class="meta-item">' +
                                '<span class="meta-icon">&#127968;</span> ' + listingType +
                            '</span>' : '') +
                        '<span class="meta-item">' +
                            '<span class="source-tag">' + escapeHtml(source) + '</span>' +
                        '</span>' +
                        (firstSeen ?
                            '<span class="meta-item">' +
                                '<span class="meta-icon">&#128337;</span> ' + firstSeen +
                            '</span>' : '') +
                    '</div>' +
                '</div>' +
                '<div class="listing-price-col">' +
                    '<div class="listing-price">' + price + '</div>' +
                    (estimatedTotal ?
                        '<div class="listing-estimated">Est. total: ' + estimatedTotal + '</div>' : '') +
                    (listing.first_seen_at ?
                        '<div class="listing-date">First seen: ' +
                            new Date(listing.first_seen_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
                        '</div>' : '') +
                '</div>' +
            '</div>';
        }

        // Render listings into the DOM
        function renderListings(listings) {
            const area = document.getElementById('listings-area');
            const countEl = document.getElementById('listings-count');

            if (!listings || listings.length === 0) {
                area.innerHTML =
                    '<div class="empty-state">' +
                        '<div style="font-size: 48px; margin-bottom: 12px;">&#128270;</div>' +
                        '<div style="font-size: 18px; color: #ffffff; margin-bottom: 8px;">No listings found</div>' +
                        '<div>Try adjusting your filters or check back later.</div>' +
                    '</div>';
                countEl.textContent = '0 listings';
                return;
            }

            countEl.textContent = listings.length + ' listing' + (listings.length !== 1 ? 's' : '');

            const html = '<div class="listings-grid">' +
                listings.map(renderListing).join('') +
                '</div>';
            area.innerHTML = html;
        }

        // Apply filters to the stored listings
        function getFilteredListings() {
            const minPrice = parseFloat(document.getElementById('filter-min-price').value) || 0;
            const maxPrice = parseFloat(document.getElementById('filter-max-price').value) || Infinity;
            const source = document.getElementById('filter-source').value;
            const minScore = parseInt(document.getElementById('filter-min-score').value) || 0;

            return allListings.filter(function(listing) {
                const price = listing.price != null ? listing.price : 0;
                const score = listing.deal_score != null ? listing.deal_score : 0;

                if (price < minPrice) return false;
                if (price > maxPrice) return false;
                if (source !== 'all' && listing.source !== source) return false;
                if (score < minScore) return false;

                return true;
            });
        }

        function applyFilters() {
            const filtered = getFilteredListings();
            renderListings(filtered);
        }

        function resetFilters() {
            document.getElementById('filter-min-price').value = '';
            document.getElementById('filter-max-price').value = '';
            document.getElementById('filter-source').value = 'all';
            document.getElementById('filter-min-score').value = '';
            renderListings(allListings);
        }

        // Fetch data from API
        async function fetchListings() {
            try {
                const response = await fetch('/api/listings');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                allListings = data;

                // Sort by deal_score descending by default
                allListings.sort(function(a, b) {
                    return (b.deal_score || 0) - (a.deal_score || 0);
                });

                applyFilters();
            } catch (err) {
                console.error('Failed to fetch listings:', err);
                const area = document.getElementById('listings-area');
                area.innerHTML =
                    '<div class="error-state">' +
                        '<div style="font-size: 48px; margin-bottom: 12px;">&#9888;&#65039;</div>' +
                        '<div style="font-size: 18px; color: #e94560; margin-bottom: 8px;">Failed to load listings</div>' +
                        '<div style="color: #8892b0;">' + escapeHtml(err.message) + '</div>' +
                    '</div>';
            }
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const stats = await response.json();

                const totalEl = document.getElementById('stat-total');
                const avgPriceEl = document.getElementById('stat-avg-price');
                const avgScoreEl = document.getElementById('stat-avg-score');
                const stealsEl = document.getElementById('stat-steals');

                if (stats.total_active != null) totalEl.textContent = stats.total_active;
                if (stats.avg_price != null) avgPriceEl.textContent = '$' + Number(stats.avg_price).toLocaleString('en-US', { maximumFractionDigits: 0 });
                if (stats.avg_score != null) avgScoreEl.textContent = stats.avg_score;
                if (stats.steals_count != null) stealsEl.textContent = stats.steals_count;
            } catch (err) {
                console.error('Failed to fetch stats:', err);
            }
        }

        function updateTimestamp() {
            const el = document.getElementById('last-updated');
            const now = new Date();
            el.textContent = 'Updated ' + now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Initial load and auto-refresh
        async function refresh() {
            updateTimestamp();
            await Promise.all([fetchListings(), fetchStats()]);
        }

        // Start
        document.addEventListener('DOMContentLoaded', function() {
            refresh();

            // Auto-refresh every 60 seconds
            refreshTimer = setInterval(refresh, 60000);
        });

        // Allow Enter key on filter inputs to apply filters
        document.querySelectorAll('.controls-bar input, .controls-bar select').forEach(function(el) {
            el.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') applyFilters();
            });
        });
    </script>

</body>
</html>
